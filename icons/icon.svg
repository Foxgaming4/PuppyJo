  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <!-- ears -->
  <ellipse cx="150" cy="210" rx="58" ry="92" fill="#c98a4f" transform="rotate(-18 150 210)"/>
  <ellipse cx="362" cy="210" rx="58" ry="92" fill="#c98a4f" transform="rotate(18 362 210)"/>
